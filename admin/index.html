<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Schroer Memorial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1a0d;
      --surface: #0e1f10;
      --card: #102013;
      --card-border: rgba(180,210,150,0.07);
      --text: #ede9df;
      --muted: #4a6352;
      --muted-mid: #7a9480;
      --accent: #c8962a;
      --input-bg: #0d1a0f;
      --input-border: rgba(180,210,150,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- LOGIN ---- */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    #login-screen h2 {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted-mid);
    }

    #password-input {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      width: 240px;
      outline: none;
    }

    #password-input:focus { border-color: rgba(200,150,42,0.3); }

    #login-btn {
      background: rgba(200,150,42,0.1);
      border: 1px solid rgba(200,150,42,0.25);
      border-radius: 2px;
      color: var(--accent);
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 10px 24px;
      cursor: pointer;
      width: 240px;
    }

    #login-btn:hover { background: rgba(200,150,42,0.18); }
    #login-error { font-size: 12px; color: #c06040; }

    /* ---- EDITOR ---- */
    #editor-screen { display: none; }

    .admin-header {
      background: var(--surface);
      border-bottom: 1px solid var(--card-border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .admin-header h1 {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted-mid);
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #chapter-select {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 300;
      padding: 6px 10px;
      outline: none;
      cursor: pointer;
    }

    #save-btn {
      background: rgba(200,150,42,0.1);
      border: 1px solid rgba(200,150,42,0.3);
      border-radius: 2px;
      color: var(--accent);
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 8px 20px;
      cursor: pointer;
    }

    #save-btn:hover { background: rgba(200,150,42,0.18); }
    #save-btn:disabled { opacity: 0.5; cursor: default; }

    /* ---- SITE FIELDS ---- */
    .site-fields {
      max-width: 560px;
      margin: 24px auto 0;
      padding: 0 20px;
    }

    .site-fields h2 {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ---- BLOCKS ---- */
    #blocks-container {
      max-width: 560px;
      margin: 24px auto 80px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .chapter-section-label {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 24px 0 10px;
      border-bottom: 1px solid var(--card-border);
      margin-bottom: 4px;
    }

    .block-row {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
    }

    .block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--card-border);
    }

    .type-pill {
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }

    .type-text           { background: rgba(120,160,200,0.12); color: #8ab0d0; }
    .type-photo          { background: rgba(120,200,140,0.1);  color: #80c090; }
    .type-video-square   { background: rgba(200,150,42,0.1);   color: var(--accent); }
    .type-video-vertical { background: rgba(200,100,42,0.1);   color: #d07040; }
    .type-interstitial   { background: rgba(160,120,200,0.1);  color: #b090d0; }

    .block-controls {
      display: flex;
      gap: 6px;
    }

    .block-controls button {
      background: transparent;
      border: 1px solid var(--card-border);
      border-radius: 2px;
      color: var(--muted-mid);
      font-size: 12px;
      width: 26px;
      height: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .block-controls button:hover { border-color: var(--muted-mid); color: var(--text); }
    .block-controls .delete-btn:hover { border-color: #c06040; color: #c06040; }

    .block-fields {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-wrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-wrap label {
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field-wrap input,
    .field-wrap textarea,
    .field-wrap select {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 300;
      padding: 8px 10px;
      outline: none;
      resize: vertical;
      width: 100%;
    }

    .field-wrap input:focus,
    .field-wrap textarea:focus,
    .field-wrap select:focus {
      border-color: rgba(200,150,42,0.3);
    }

    /* ---- DROP ZONE ---- */
    .drop-zone {
      background: #060c07;
      border: 1px dashed rgba(150,200,140,0.15);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      max-width: 240px;
    }

    .drop-zone.drag-over { border-color: var(--accent); }
    .drop-hint {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 12px;
      pointer-events: none;
    }

    /* ---- ADD BLOCK BTN ---- */
    .add-block-btn {
      background: transparent;
      border: 1px dashed rgba(150,200,140,0.12);
      border-radius: 2px;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.18em;
      padding: 12px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      text-align: center;
    }

    .add-block-btn:hover { border-color: var(--muted); color: var(--muted-mid); }

    /* ---- BLOCK PICKER MODAL ---- */
    #block-picker-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(6,10,6,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .picker-inner {
      background: var(--surface);
      border: 1px solid var(--card-border);
      border-radius: 2px;
      padding: 28px;
      width: 320px;
    }

    .picker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .picker-header h3 {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted-mid);
    }

    #picker-close {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
    }

    .picker-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .picker-option {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 300;
      padding: 16px 12px;
      cursor: pointer;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .picker-option:hover { border-color: rgba(200,150,42,0.3); }

    .picker-option .pick-icon {
      font-size: 18px;
      line-height: 1;
      color: var(--muted-mid);
    }

    .picker-option .pick-label {
      font-size: 11px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <h2>Schroer Memorial · Admin</h2>
    <input type="password" id="password-input" placeholder="Password">
    <input type="password" id="token-input" placeholder="GitHub Token">
    <button id="login-btn">Enter</button>
    <span id="login-error"></span>
  </div>

  <!-- EDITOR -->
  <div id="editor-screen">

    <div class="admin-header">
      <h1>Schroer Memorial · Admin</h1>
      <div class="header-controls">
        <select id="chapter-select"></select>
        <button id="save-btn">Save</button>
      </div>
    </div>

    <div class="site-fields">
      <h2>Site Settings</h2>
      <div class="field-wrap">
        <label>Intro Text</label>
        <textarea id="site-intro" rows="2"></textarea>
      </div>
      <div class="field-wrap" style="margin-top:10px;">
        <label>Footer Text</label>
        <input type="text" id="site-footer">
      </div>
    </div>

    <div id="blocks-container"></div>

  </div>

  <!-- BLOCK PICKER MODAL -->
  <div id="block-picker-modal">
    <div class="picker-inner">
      <div class="picker-header">
        <h3>Add Block</h3>
        <button id="picker-close">✕</button>
      </div>
      <div class="picker-grid">
        <button class="picker-option" data-type="text">
          <span class="pick-icon">¶</span>
          <span class="pick-label">Text / Quote</span>
        </button>
        <button class="picker-option" data-type="photo">
          <span class="pick-icon">▭</span>
          <span class="pick-label">Photo</span>
        </button>
        <button class="picker-option" data-type="video-square">
          <span class="pick-icon">□</span>
          <span class="pick-label">Square Video</span>
        </button>
        <button class="picker-option" data-type="video-vertical">
          <span class="pick-icon">▯</span>
          <span class="pick-label">Vertical Video</span>
        </button>
        <button class="picker-option" data-type="interstitial">
          <span class="pick-icon">—</span>
          <span class="pick-label">Interstitial</span>
        </button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
